# 1D Sod tube using setFields
dim = 1

nx = 400
ng = 4
x0 = 0.0
x1 = 1.0

gamma = 1.4
cfl = 0.5
finalTime = 0.2

flux = hllc       # rusanov | hllc | ausm | godunovExact
timeIntegrator = rk4
bc = slipWall

mpi.px = 1
mpi.py = 1

reconstruction.scheme     = weno5               # firstOrder | muscl
reconstruction.enableFallback = true            # true | false
reconstruction.rhoMin     = 1e-12
reconstruction.pMin       = 1e-12
reconstruction.limiter    = minmod              # none | minmod | vanleer | mc | superbee
reconstruction.positivityFix = true             # true | false
reconstruction.eps        = 1e-12


setFields.use = true

setFields.bg.rho = 0.125
setFields.bg.u   = 0.0
setFields.bg.p   = 0.1

setFields.nRegions = 1
setFields.region1.xMin = 0.0
setFields.region1.xMax = 0.5
setFields.region1.rho  = 1.0
setFields.region1.u    = 0.0
setFields.region1.p    = 1.0

outPrefix = solution
outputEvery = 20
writeFinal = true

stateDiagnostics.enable = true
stateDiagnostics.csv = solution/state_diagnostics_1d.csv
