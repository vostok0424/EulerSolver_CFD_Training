# =========================================================
# Standard full cfg template for the 2D Euler solver
# Notes:
# - file format is: key = value
# - comments start with '#'
# - duplicated keys are allowed; the last one wins
# - this solver is 2D-only, so dim must be 2
# =========================================================


# 1. Solver dimension
dim = 2                          # must be 2

# 2. Global mesh
nx = 400                         # number of interior cells in x over the global domain
ny = 200                         # number of interior cells in y over the global domain
ng = 4                           # number of ghost-cell layers; must satisfy reconstruction stencil width

x0 = 0.0                         # global domain lower bound in x
x1 = 1.0                         # global domain upper bound in x
y0 = 0.0                         # global domain lower bound in y
y1 = 0.2                         # global domain upper bound in y

# 3. Physical and run-control parameters
gamma = 1.4                      # ratio of specific heats
cfl = 0.2                        # CFL number for explicit time stepping
finalTime = 0.2                  # stop time

# 4. Numerical methods
flux = hllc                      # supported: rusanov | hllc | ausm | godunov
timeIntegrator = rk4             # supported: euler | rk2 | ssprk3 | rk4

# 5. Boundary conditions
# 'bc' gives the default boundary type for all four sides.
# If bc.left / bc.right / bc.bottom / bc.top are provided,
# they override this default on the corresponding side.
#
# supported BC names:
#   zeroGradient | slipWall | symmetry | inlet | outlet
#
# note:
# - inlet requires primitive state input
# - outlet requires outlet pressure input
bc = zeroGradient

bc.left   = zeroGradient
bc.right  = zeroGradient
bc.bottom = zeroGradient
bc.top    = zeroGradient

# Inlet data
# Global inlet primitive state. These are used if a side is set to inlet
# and no side-specific inlet values are given.
bc.inlet.rho = 1.0
bc.inlet.u   = 0.0
bc.inlet.v   = 0.0
bc.inlet.p   = 1.0

# Optional side-specific inlet states.
# Only needed when the corresponding side uses bc.<side> = inlet.
bc.left.inlet.rho   = 1.0
bc.left.inlet.u     = 0.0
bc.left.inlet.v     = 0.0
bc.left.inlet.p     = 1.0

bc.right.inlet.rho  = 1.0
bc.right.inlet.u    = 0.0
bc.right.inlet.v    = 0.0
bc.right.inlet.p    = 1.0

bc.bottom.inlet.rho = 1.0
bc.bottom.inlet.u   = 0.0
bc.bottom.inlet.v   = 0.0
bc.bottom.inlet.p   = 1.0

bc.top.inlet.rho    = 1.0
bc.top.inlet.u      = 0.0
bc.top.inlet.v      = 0.0
bc.top.inlet.p      = 1.0

# Outlet data
# Global outlet pressure. Used if a side is set to outlet and no
# side-specific outlet pressure is given.

bc.outlet.p = 1.0

# Optional side-specific outlet pressure.
# Only needed when the corresponding side uses bc.<side> = outlet.
bc.left.outlet.p   = 1.0
bc.right.outlet.p  = 1.0
bc.bottom.outlet.p = 1.0
bc.top.outlet.p    = 1.0

# 6. MPI decomposition
# The global mesh is decomposed into mpi.px * mpi.py blocks.
# In practice, px * py should match the number of MPI ranks.
mpi.px = 1
mpi.py = 1

# 7. Reconstruction options
# supported schemes:
#   firstOrder | muscl | weno5
#
# supported limiters:
#   none | minmod | vanleer
#
# notes:
# - limiter is mainly relevant to MUSCL
# - ng must be large enough for the selected reconstruction scheme

reconstruction.scheme = weno5
reconstruction.limiter = vanleer

reconstruction.enableFallback = true    # allow fallback when reconstruction produces invalid states
reconstruction.positivityFix  = true    # enforce rho/p positivity protection
reconstruction.eps            = 1e-12   # small regularization parameter
reconstruction.rhoMin         = 1e-12   # minimum admissible density
reconstruction.pMin           = 1e-12   # minimum admissible pressure

# compatibility key kept by the current code path
# recommended value: characteristic
reconstruction.variables = characteristic

# 8. Positivity-preserving flux limiter
# This limiter is applied after high-order face flux evaluation and before
# finite-volume RHS assembly. It blends the high-order flux with a robust
# low-order flux when the one-sided update may violate rho/p positivity.
#
# recommended first tests:
# - keep disabled for baseline regression tests
# - enable with timeIntegrator = ssprk3 for strong shocks / near-vacuum cases
positivityPreserving.enable = false
positivityPreserving.rhoFloor = 1e-13
positivityPreserving.pFloor   = 1e-13
positivityPreserving.lowOrderFlux = rusanov        # supported: rusanov | globalLF
positivityPreserving.alphaMode = constant          # supported: constant | waveSpeedWeighted
positivityPreserving.pressureBisectionIters = 20

# 9. Initial condition selection
# Two initialization paths exist:
#
# 1) setFields.use = false
#    -> use built-in IC specified by 'ic' and related ic2d.* keys
#
# 2) setFields.use = true
#    -> ignore built-in IC and initialize by background state + rectangular regions
setFields.use = false

# Built-in IC name.
# The current built-in IC path in this code is sodx.
ic = sodx

# Built-in IC parameters: 2D Sod-x / x-direction Riemann IC
# Used only when:
#   setFields.use = false
#   ic = sodx
#
# The discontinuity is placed at x = ic2d.sodx.xMid.
# Left and right primitive states are uniform in y.
ic2d.sodx.xMid = 0.5

ic2d.sodx.rhoL = 1.0
ic2d.sodx.uL   = 0.0
ic2d.sodx.vL   = 0.0
ic2d.sodx.pL   = 1.0

ic2d.sodx.rhoR = 0.125
ic2d.sodx.uR   = 0.0
ic2d.sodx.vR   = 0.0
ic2d.sodx.pR   = 0.1

# 10. setFields initialization
# Used only when:
#   setFields.use = true
#
# Initialization procedure:
#   1) fill the whole interior domain with the background state
#   2) overwrite selected rectangular regions one by one
#
# If regions overlap, later regions overwrite earlier ones.
setFields.bg.rho = 1.0
setFields.bg.u   = 0.0
setFields.bg.v   = 0.0
setFields.bg.p   = 1.0

setFields.nRegions = 0           # number of rectangular override regions

# Region template
# Each region is an axis-aligned box:
#   [xMin, xMax] × [yMin, yMax]
#
# For each region, there are two ways to define the state:
#
# A) Direct primitive input:
#    setFields.regionN.rho / u / v / p
#
# B) Shock-generated post-shock state:
#    setFields.regionN.shockMach > 1
#    setFields.regionN.shockDir = +x | -x | +y | -y
#
# If shockMach > 0, the code uses the shock-based construction path.
# Otherwise it uses the directly specified primitive values.
#
# Region index starts from 1.
setFields.region1.xMin = 0.0
setFields.region1.xMax = 0.5
setFields.region1.yMin = 0.0
setFields.region1.yMax = 0.2

setFields.region1.rho = 1.0
setFields.region1.u   = 0.0
setFields.region1.v   = 0.0
setFields.region1.p   = 1.0

setFields.region1.shockMach = -1.0      # set > 1.0 to activate shock-based region construction
setFields.region1.shockDir  = +x        # valid: +x | -x | +y | -y

# More region templates
# Copy and extend as needed up to setFields.nRegions.
#
# setFields.region2.xMin = ...
# setFields.region2.xMax = ...
# setFields.region2.yMin = ...
# setFields.region2.yMax = ...
# setFields.region2.rho  = ...
# setFields.region2.u    = ...
# setFields.region2.v    = ...
# setFields.region2.p    = ...
# setFields.region2.shockMach = -1.0
# setFields.region2.shockDir  = +x
#
# setFields.region3...
# setFields.region4...
# ...

# 11. Output control
outPrefix = solution                     # prefix of output file names
outputEvery = 20                         # write one step file every N time steps
writeFinal = true                        # also write a final file at the end

# 12. State diagnostics
# If enabled, the solver writes a CSV summary of state-quality checks.
stateDiagnostics.enable = true
stateDiagnostics.csv = solution/state_diagnostics_2d.csv
