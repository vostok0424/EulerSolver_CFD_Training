# 2D Sod-x
dim = 2

nx = 1000
ny = 20
ng = 4

x0 = 0.0
x1 = 1.0
y0 = 0.0
y1 = 0.02

gamma = 1.4
cfl = 0.2
finalTime = 0.2

flux = hllc                                     # rusanov | hllc | ausm | godunovExact
timeIntegrator = rk4                            # euler | rk2 | ssprk3 | rk4
bc = zeroGradient                               # slipWall | inlet | outlet | zeroGradient

mpi.px = 4
mpi.py = 2


reconstruction.scheme     = weno5               # firstOrder | muscl | weno5
reconstruction.enableFallback = true            # true | false
reconstruction.rhoMin     = 1e-12
reconstruction.pMin       = 1e-12
reconstruction.limiter    = none                # none | minmod | vanleer | mc | superbee
reconstruction.positivityFix = true             # true | false
reconstruction.eps        = 1e-12

setFields.use = true

setFields.bg.rho = 0.125
setFields.bg.u   = 0.0
setFields.bg.v   = 0.0
setFields.bg.p   = 0.1

setFields.nRegions = 1

setFields.region1.xMin = 0.0
setFields.region1.xMax = 0.5
setFields.region1.yMin = 0.0
setFields.region1.yMax = 0.2
setFields.region1.rho  = 1.0
setFields.region1.u    = 0.5
setFields.region1.v    = 0.0
setFields.region1.p    = 1.0

outPrefix = solution
outputEvery = 20
writeFinal = true

stateDiagnostics.enable = true
stateDiagnostics.csv = solution/state_diagnostics_2d.csv
